version: '"'3.8'"'
services:
  frontend:
    build: ./frontend
    command: npm start
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - web
  backend:
    build: ./backend
    command: flask run --host=0.0.0.0 --reload
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
    networks:
      - web
  nginx:
    volumes:
      - ./nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    networks:
      - web

volumes:
  frontend_node_modules:
'
