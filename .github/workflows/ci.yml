name: CI

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]

permissions:
  contents: read
  packages: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Build
        run: npm run build --if-present
      - name: Test
        run: npm test --if-present

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint (flake8)
        run: |
          pip install flake8
          flake8 . --count --max-line-length=120 --statistics
      - name: Test
        run: python -m pytest -q

  docker-stack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build docker compose stack
        run: docker compose build

  smoke:
    runs-on: ubuntu-latest
    needs: docker-stack
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build and run compose (production)
        run: |
          docker compose -f docker-compose.yml up -d --build
      - name: Wait for health and run smoke checks
        run: |
          # Wait for backend to be ready (healthcheck inside container)
          for i in $(seq 1 30); do
            if docker compose exec -T backend curl -sf http://localhost:5000/api/health | grep -q '"status": "ok"'; then
              echo 'backend ok';
              break;
            fi;
            sleep 2;
            if [ "$i" -eq 30 ]; then
              echo "healthcheck failed"; exit 1;
            fi;
          done
          curl -sS http://localhost:80 | grep -q "<!DOCTYPE html>" || (echo 'frontend not serving HTML' && exit 1)
      - name: Tear down
        run: docker compose down
