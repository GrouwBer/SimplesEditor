version: '"'3.8'"'
services:
  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - web
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
    networks:
      - web
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - web

networks:
  web:
'
