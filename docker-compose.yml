version: "3.9"

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    environment:
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - VITE_API_BASE=/api
      - VITE_WS_BASE=/ws
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "5000"
    environment:
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - EXEC_TIMEOUT_S=10
      - COMPILE_TIMEOUT_S=15
      - MAX_CODE_KB=64
      - RUNS_PER_MINUTE=30
      - SANDBOX_IMAGE=simples-runner:latest
      - LOG_LEVEL=INFO
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # spawn de containers
      - simples_tmp:/tmp/simples
    depends_on:
      - runner_image_build
    restart: unless-stopped

  # Pseudo-serviço apenas para construir a imagem do sandbox
  runner_image_build:
    image: simples-runner:latest
    build:
      context: ./runner
      dockerfile: Dockerfile
    command: ["true"]      # sai imediatamente; só queremos a imagem construída
    restart: "no"

volumes:
  simples_tmp:
