worker_processes auto;
events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # WebSocket upgrade
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream frontend_upstream { server frontend:80; }
  upstream backend_upstream  { server backend:5000; }

  # Configuração para desenvolvimento local em HTTP
  server {
    listen 80;
    server_name localhost 127.0.0.1;

    # Frontend (estático)
    location / {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
    }

    # API REST
    location /api/ {
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }

    # WebSocket
    location /ws/ {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
    }

    # Bloqueia /metrics externamente
    location = /metrics { deny all; return 403; }

    client_max_body_size 256k;
  }

  # Redirecionamento HTTPS para domínio de produção
  server {
    listen 80;
    server_name simples.example.edu.br;
    return 301 https://$host$request_uri;
  }

  # Configuração HTTPS de Produção
  server {
    listen 443 ssl http2;
    server_name simples.example.edu.br;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Frontend (estático)
    location / {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
    }

    # API REST
    location /api/ {
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }

    # WebSocket
    location /ws/ {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 600s;     # > exec_timeout
      proxy_send_timeout 600s;
    }

    # Bloqueia /metrics externamente
    location = /metrics { deny all; return 403; }

    client_max_body_size 256k;     # > max_code_kb com folga
  }
}
