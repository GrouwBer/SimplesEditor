# nginx/default.dev.conf
# Configuracao de desenvolvimento com hot-reload (Vite + Flask).
#
# - Proxy /api/* → backend Flask na porta 5000
# - Proxy /*     → frontend Vite dev server na porta 5173 (HMR via WebSocket)
#
# Diferente do nginx/nginx.conf (producao, com TLS, porta 443, static files),
# este arquivo eh usado pelo docker-compose.override.yml durante desenvolvimento.
#
# Nao usar em producao — nao tem TLS, CORS aberto, e expoe portas de dev.

server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_pass http://backend:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://frontend:5173/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Vite HMR WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
